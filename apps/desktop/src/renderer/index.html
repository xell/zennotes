<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy.

      script-src keeps 'unsafe-eval' because three diagram engines shipped
      in preview depend on runtime evaluation:
        * function-plot evaluates math.js expressions via new Function()
        * jsxgraph evaluates formula strings for interactive geometry
        * mermaid's parser path has historically relied on runtime eval

      Removing it would disable those features. The proper future fix is
      to render each diagram block inside a sandboxed iframe that has its
      own relaxed CSP, keeping the main renderer on a strict policy.

      style-src keeps 'unsafe-inline' because React inline styles and
      Tailwind arbitrary values emit inline style attributes.

      object-src / base-uri / form-action are all locked down. Navigation is
      additionally gated by setWindowOpenHandler and will-navigate in the main
      process. Note: frame-ancestors is intentionally absent — browsers ignore
      it in <meta> tags (spec-mandated); in Electron the equivalent protection
      comes from the main-process navigation guards above.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob: zen-asset:; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: zen-asset:; media-src 'self' data: blob: zen-asset:; frame-src 'self' data: blob: zen-asset:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' zen-asset:; object-src 'none'; base-uri 'none'; form-action 'none'; manifest-src 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenNotes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
